<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<title>Final Omega</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#e0e4ef;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* ── Fundo animado: orbs flutuantes ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:float 20s ease-in-out infinite}
.orb:nth-child(1){width:520px;height:520px;background:radial-gradient(circle,#1a5fd4,transparent 70%);top:-12%;left:-10%;animation-duration:22s}
.orb:nth-child(2){width:420px;height:420px;background:radial-gradient(circle,#1557b0,transparent 70%);bottom:-15%;right:-5%;animation-duration:18s;animation-delay:-5s}
.orb:nth-child(3){width:320px;height:320px;background:radial-gradient(circle,#1a73e8,transparent 70%);top:45%;left:55%;animation-duration:25s;animation-delay:-10s}
.orb:nth-child(4){width:200px;height:200px;background:radial-gradient(circle,#d4a51a,transparent 70%);top:20%;right:20%;animation-duration:30s;animation-delay:-15s;opacity:.12}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(40px,-30px) scale(1.05)}
  50%{transform:translate(-20px,50px) scale(.95)}
  75%{transform:translate(30px,20px) scale(1.02)}
}

/* ── Noise overlay ── */
.bg::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.6;pointer-events:none}

/* ── Grid decorativa ── */
.grid-deco{position:fixed;inset:0;z-index:0;background-image:
  linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size:60px 60px;pointer-events:none}

/* ── Card ── */
.card{position:relative;z-index:1;width:400px;max-width:90vw;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:24px;padding:48px 36px 36px;backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03) inset;animation:cardIn .8s cubic-bezier(.16,1,.3,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:8px}
.logo-icon{width:56px;height:56px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,#1a73e8,#1557b0);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(26,115,232,.3)}
.logo-icon svg{width:28px;height:28px}
.logo-text{font-size:34px;font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#5a9cf5 0%,#8bb8fa 40%,#d4a51a 80%,#f0c850 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.logo-sub{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.25);text-transform:uppercase;margin-top:6px;font-weight:300;font-style:italic}
.logo-motto{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.15);margin-top:16px;margin-bottom:8px;font-weight:300}

/* ── Form ── */
.field{margin-bottom:20px;position:relative}
.field label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.field input{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:15px;color:#e0e4ef;font-family:'Outfit',sans-serif;outline:none;transition:all .3s}
.field input:focus{border-color:rgba(26,115,232,.5);background:rgba(255,255,255,.06);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.field input::placeholder{color:rgba(255,255,255,.15)}

.btn-login{width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:1px;cursor:pointer;transition:all .3s;background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;box-shadow:0 4px 24px rgba(26,115,232,.35);position:relative;overflow:hidden}
.btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%);transform:translateX(-100%);transition:none}
.btn-login:hover{box-shadow:0 6px 32px rgba(26,115,232,.5);transform:translateY(-1px)}
.btn-login:hover::after{transform:translateX(100%);transition:transform .6s ease}
.btn-login:active{transform:translateY(0) scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error{margin-top:14px;font-size:13px;color:#e07065;text-align:center;min-height:20px;opacity:0;transition:opacity .3s}
.error.show{opacity:1}

/* ── Rodapé ── */
.version{text-align:center;margin-top:24px;font-size:10px;color:rgba(255,255,255,.12);letter-spacing:2px;line-height:1.6}

/* ── Marca d'água Sunshine ── */
.watermark{position:fixed;bottom:20px;right:24px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,.04);z-index:0;pointer-events:none;text-transform:uppercase;writing-mode:vertical-rl}

/* ── Responsivo ── */
@media(max-width:440px){
  .card{padding:36px 24px 28px;border-radius:20px}
  .logo-text{font-size:26px;letter-spacing:6px}
  .logo-icon{width:48px;height:48px;border-radius:14px}
  .logo-icon svg{width:24px;height:24px}
}
</style>
</head>
<body>

<div class="bg">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="grid-deco"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="logo-text">OMEGA</div>
    <div class="logo-sub">Painel de Controle</div>
    <div class="logo-motto">I am all as I am none</div>
  </div>

  <div class="field">
    <label>Senha de acesso</label>
    <input type="password" id="pw" placeholder="Digite a senha" autofocus autocomplete="current-password">
  </div>

  <button class="btn-login" id="btn" onclick="doLogin()">Entrar</button>

  <div class="error" id="err"></div>
  <div class="version">OMEGA PAINEL v8.0 — Sunshine Edition</div>
</div>

<div class="watermark">Sunshine</div>

<script>
const pw = document.getElementById('pw');
const btn = document.getElementById('btn');
const err = document.getElementById('err');

pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const token = pw.value.trim();
  if (!token) { showErr('Digite a senha'); return; }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  err.classList.remove('show');

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const j = await r.json();
    if (j.success) {
      window.location.href = '/';
    } else {
      showErr(j.error || 'Senha incorreta');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  } catch(e) {
    showErr('Erro de conexao');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function showErr(msg) {
  err.textContent = msg;
  err.classList.add('show');
}

// Se já está autenticado, redireciona
fetch('/api/auth/check').then(r=>r.json()).then(j=>{ if(j.authed) window.location.href='/'; });
</script>
</body>
</html>
